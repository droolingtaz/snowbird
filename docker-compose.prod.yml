# Production compose — pulls tagged images from GHCR instead of building locally.
# Used on the VM. Controlled entirely by IMAGE_TAG env var so the CD workflow
# can atomically switch versions and roll back.
#
# Usage on the VM:
#   export IMAGE_TAG=sha-abc1234
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-snowbird}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snowbird_secret}
      POSTGRES_DB: ${POSTGRES_DB:-snowbird}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snowbird}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/snowbird-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; urllib.request.urlopen(\"http://localhost:8000/api/health\", timeout=3)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    command: >
      sh -c "alembic upgrade head &&
             python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/snowbird-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
