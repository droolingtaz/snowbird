name: Deploy — self-hosted runner + smoke + auto-rollback

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        required: true
        type: string
        description: "Image tag to deploy (e.g. sha-abc1234 or latest)"

jobs:
  deploy:
    name: Deploy + validation (self-hosted)
    runs-on: [self-hosted, snowbird]
    concurrency:
      group: deploy-snowbird
      cancel-in-progress: false
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      IMAGE_NAMESPACE: ${{ github.repository_owner }}
      SMOKE_ALPACA_KEY: ${{ secrets.SMOKE_ALPACA_KEY }}
      SMOKE_ALPACA_SECRET: ${{ secrets.SMOKE_ALPACA_SECRET }}
    steps:
      - name: Checkout repo on runner
        uses: actions/checkout@v6

      - name: Sync scripts & compose file to /opt/snowbird
        run: |
          set -euo pipefail
          sudo install -m 0755 scripts/smoke_test.sh /opt/snowbird/scripts/smoke_test.sh
          sudo install -m 0755 scripts/pg_backup.sh /opt/snowbird/scripts/pg_backup.sh
          sudo install -m 0644 docker-compose.prod.yml /opt/snowbird/docker-compose.prod.yml
          sudo chown -R "$USER:$USER" /opt/snowbird/scripts /opt/snowbird/docker-compose.prod.yml
          sudo install -m 0644 scripts/systemd/snowbird-backup.service /etc/systemd/system/snowbird-backup.service
          sudo install -m 0644 scripts/systemd/snowbird-backup.timer /etc/systemd/system/snowbird-backup.timer
          sudo systemctl daemon-reload
          sudo systemctl enable --now snowbird-backup.timer

      - name: Prepare deploy
        working-directory: /opt/snowbird
        run: |
          set -euo pipefail
          echo "Target image tag: $IMAGE_TAG"
          PREV_TAG="$(grep '^IMAGE_TAG=' .env 2>/dev/null | cut -d= -f2 || true)"
          PREV_TAG="${PREV_TAG:-latest}"
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"
          echo "Previous tag: $PREV_TAG"
          grep -v '^IMAGE_TAG=\|^IMAGE_NAMESPACE=' .env > .env.new 2>/dev/null || true
          echo "IMAGE_TAG=$IMAGE_TAG" >> .env.new
          echo "IMAGE_NAMESPACE=$IMAGE_NAMESPACE" >> .env.new
          mv .env.new .env

      - name: Pull images
        working-directory: /opt/snowbird
        run: docker compose -f docker-compose.prod.yml pull

      - name: Rolling deploy
        working-directory: /opt/snowbird
        run: docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Post-deploy smoke test
        id: smoke
        working-directory: /opt/snowbird
        run: |
          set -euo pipefail
          sleep 5
          bash scripts/smoke_test.sh

      - name: Record successful deploy
        if: success()
        working-directory: /opt/snowbird
        run: |
          echo "$IMAGE_TAG" >> .deploy_history
          tail -n 5 .deploy_history > .deploy_history.trim && mv .deploy_history.trim .deploy_history
          echo "Smoke passed — deploy $IMAGE_TAG complete."

      - name: Auto-rollback on failure
        if: failure() && steps.smoke.outcome == 'failure'
        working-directory: /opt/snowbird
        run: |
          set -euo pipefail
          echo "::error::Smoke test FAILED — rolling back to $PREV_TAG"
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env
          docker compose -f docker-compose.prod.yml pull || true
          docker compose -f docker-compose.prod.yml up -d
          sleep 5
          if bash scripts/smoke_test.sh; then
            echo "::error::Rolled back to $PREV_TAG successfully."
          else
            echo "::error::ROLLBACK SMOKE ALSO FAILED — manual intervention required."
          fi
          exit 1

      - name: Cleanup old images
        if: always()
        run: docker image prune -f --filter "until=168h" || true
